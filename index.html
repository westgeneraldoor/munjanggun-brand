<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./preview.html">
  <title>문장군 디자인 미리보기로 이동</title>
  <style>
    :root {
      --cocoa-oak: #2C221E;
      --cashmere-cream: #F5EFE6;
      --clay-terracotta: #B35D43;
      --paper-white: #FFFCF7;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--cashmere-cream);
      color: var(--cocoa-oak);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(520px, calc(100% - 40px));
      padding: 32px;
      border: 1px solid rgba(44, 34, 30, .12);
      border-radius: 8px;
      background: var(--paper-white);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.25;
    }

    p {
      margin: 0 0 22px;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 8px;
      background: var(--clay-terracotta);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>문장군 디자인 미리보기</h1>
    <p>잠시 후 DESIGN.md v3.0 미리보기 페이지로 이동합니다.</p>
    <a href="./preview.html">바로 보기</a>
  </main>
</body>
</html>
